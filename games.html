<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamePilot — Games</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; min-height: 100%;
        background: #07070d; color: #e8e8f0;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      }
      #app { width: min(1100px, 100%); margin: 0 auto; padding: 20px 16px 40px; }
      header { text-align: center; margin-bottom: 6px; }
      header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
      header h1 a { color: inherit; text-decoration: none; }
      header p { margin: 4px 0 0; font-size: 13px; opacity: 0.6; }

      .toolbar { display: flex; align-items: center; gap: 12px; margin: 16px 2px; }
      .toolbar .muted { font-size: 13px; opacity: 0.55; }
      .spacer { flex: 1; }
      .btn {
        display: inline-block; padding: 8px 14px; border-radius: 8px;
        border: 1px solid #2a2a3a; background: #14141f; color: #dfe4f2;
        font-size: 13px; cursor: pointer; text-decoration: none;
      }
      .btn:hover { background: #1d1d2c; }
      .btn.primary { background: #1c2a44; color: #cfe0ff; border-color: #2a3f63; }
      .btn.primary:hover { background: #243657; }
      .btn.danger { background: #1f1414; color: #ff9b9b; border-color: #3a2424; }
      .btn.danger:hover { background: #301a1a; }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
      .card {
        display: flex; flex-direction: column;
        border: 1px solid #1c1c2a; border-radius: 12px; background: #0c0c14;
        overflow: hidden; transition: border-color 0.15s, transform 0.1s;
      }
      .card:hover { border-color: #2c3450; }
      .card-body { padding: 14px; cursor: pointer; flex: 1; }
      .card-title { font-size: 15px; font-weight: 600; }
      .card-idea {
        margin-top: 6px; font-size: 12.5px; opacity: 0.62; line-height: 1.4;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .card-date { margin-top: 10px; font-size: 11px; opacity: 0.4; }
      .card-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #15151f; }
      .card-actions .btn { flex: 0 0 auto; }
      .card-actions .play { flex: 1; text-align: center; }

      .empty { grid-column: 1 / -1; text-align: center; opacity: 0.6; padding: 60px 0; font-size: 14px; }
      .empty a { color: #9ab8ff; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1><a href="/">🎮 GamePilot</a></h1>
        <p>Your games</p>
      </header>
      <div class="toolbar">
        <a class="btn primary" href="/">＋ New game</a>
        <span id="count" class="muted"></span>
        <span class="spacer"></span>
        <button id="refresh" class="btn" title="Reload the list">↻ Refresh</button>
      </div>
      <div id="library" class="grid"></div>
    </div>
    <script type="module" src="/src/library.ts"></script>
  </body>
</html>
