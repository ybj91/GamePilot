<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamePilot — Glyphs</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; min-height: 100%;
        background: #07070d; color: #e8e8f0;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      }
      #app { width: min(1100px, 100%); margin: 0 auto; padding: 20px 16px 40px; }
      header { text-align: center; margin-bottom: 6px; }
      header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
      header h1 a { color: inherit; text-decoration: none; }
      header p { margin: 4px 0 0; font-size: 13px; opacity: 0.6; }

      .toolbar { display: flex; align-items: center; gap: 12px; margin: 16px 2px; }
      .toolbar .muted { font-size: 13px; opacity: 0.55; }
      .spacer { flex: 1; }
      .btn {
        display: inline-block; padding: 8px 14px; border-radius: 8px;
        border: 1px solid #2a2a3a; background: #14141f; color: #dfe4f2;
        font-size: 13px; cursor: pointer; text-decoration: none;
      }
      .btn:hover { background: #1d1d2c; }
      .btn.primary { background: #1c2a44; color: #cfe0ff; border-color: #2a3f63; }
      .btn.primary:hover { background: #243657; }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 12px; }
      .card {
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        border: 1px solid #1c1c2a; border-radius: 12px; background: #0c0c14;
        padding: 14px 10px 12px; transition: border-color 0.15s;
      }
      .card:hover { border-color: #2c3450; }
      .card canvas { display: block; image-rendering: pixelated; }
      .name { font-size: 13px; font-weight: 600; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .tag { font-size: 11px; opacity: 0.5; }
      .tag.anim { color: #7CFFB0; opacity: 0.85; }
      .note { font-size: 12.5px; opacity: 0.55; margin: 4px 2px 0; line-height: 1.5; }
      code { background: #14141f; border: 1px solid #23233200; padding: 1px 5px; border-radius: 5px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1><a href="/">🎮 GamePilot</a></h1>
        <p>Glyph library</p>
      </header>
      <div class="toolbar">
        <a class="btn primary" href="/">＋ New game</a>
        <a class="btn" href="/games">📚 Games</a>
        <span id="count" class="muted"></span>
        <span class="spacer"></span>
      </div>
      <div id="gallery" class="grid"></div>
      <p class="note">
        Built-in <code>glyph</code> presets — pure-data pixel silhouettes drawn in each entity's color (no assets).
        Use one with <code>"glyph": "&lt;name&gt;"</code> on an entity; multi-frame presets animate on their own.
        Animated previews loop here at 6&nbsp;fps.
      </p>
    </div>
    <script type="module" src="/src/glyphs-gallery.ts"></script>
  </body>
</html>
