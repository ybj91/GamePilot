<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GamePilot</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: #07070d;
        color: #e8e8f0;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 16px;
      }
      header { text-align: center; }
      header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
      header p { margin: 4px 0 0; font-size: 13px; opacity: 0.6; }
      .idea-bar {
        display: flex;
        gap: 8px;
        width: min(800px, 100%);
      }
      .idea-bar input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #2a2a3a;
        background: #12121c;
        color: inherit;
        font-size: 14px;
      }
      .idea-bar button {
        padding: 10px 16px;
        border-radius: 8px;
        border: 1px solid #2a2a3a;
        background: #1c2a44;
        color: #cfe0ff;
        font-size: 14px;
        cursor: pointer;
      }
      .idea-bar button:hover { background: #243657; }
      .stage { position: relative; }
      canvas {
        display: block;
        border-radius: 12px;
        border: 1px solid #1c1c2a;
        touch-action: none;
      }
      /* Only the game layer gets a backdrop. The HUD canvas sits on top and
         must stay transparent, or its CSS background would hide the game. */
      #game {
        background: #0b0b12;
      }
      #hud {
        position: absolute;
        inset: 0;
        background: transparent;
        border-color: transparent;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>🎮 GamePilot</h1>
        <p>Describe a game. Play it instantly.</p>
      </header>
      <div class="idea-bar">
        <input id="idea-input" type="text" placeholder="e.g. a blob that grows by eating food but moves slower as it grows" />
        <button id="idea-go">Generate</button>
      </div>
      <div class="stage">
        <canvas id="game"></canvas>
        <canvas id="hud"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
